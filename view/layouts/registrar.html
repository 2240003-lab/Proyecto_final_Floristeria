<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floristeria la Margarita</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../public/css/registrar.css">
</head>

<body>
    <img src="../public/img/logo.png" alt="Floristería la Margarita" class="logo">
    <h1>Crea tu cuenta</h1>
    <form action="">
        <div>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Juán" required>

            <label for="apellido-materno">Apellido materno</label>
            <input type="text" id="apellido-materno" name="apellido-materno" placeholder="Díaz" required>

            <label for="apellido-paterno">Apellido paterno</label>
            <input type="text" id="apellido-paterno" name="apellido-paterno" placeholder="Suriel" required>

            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" placeholder="123-456-7890" required>
        </div>
        <div>
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required>
        </div>
        <div>
            <label for="ciudad">Ciudad</label>
            <input type="text" id="ciudad" name="ciudad" placeholder="Santiago" required>

            <label for="Sector">Sector</label>
            <input type="text" id="Sector" name="Sector" placeholder="Arroyo Hondo" required>

            <label for="calle">Calle</label>
            <input type="text" id="calle" name="calle" placeholder="Av. Arroyo Hondo" required>
        </div>
        <div>
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>

            <label for="confirmar-contrasena">Confirmar contraseña</label>
            <input type="password" id="confirmar-contrasena" name="confirmar-contrasena" placeholder="••••••••"
                required>
        </div>
        <button type="submit">Registrarse</button>
        <a href="inicio-sesion.html">¿Ya tienes una cuenta? Inicia sesión aquí</a>
    </form>
</body>

</html>
